<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPT Pro Studio — 控制台</title>
<style>
  :root {
    --bg: #0D1117; --surface: #151D2E; --primary: #D4A060;
    --secondary: #58A6FF; --text: #FFFFFF; --muted: #8B949E;
    --accent: #3FB950; --line: #30363D; --radius: 10px;
    --danger: #FF4D4D; --warning: #F2B705; --success: #3FB950;
    --font: "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    line-height: 1.6; min-height: 100vh;
  }
  /* ---- header + step bar ---- */
  header {
    background: linear-gradient(135deg, var(--surface), #1a2438);
    border-bottom: 2px solid var(--primary); padding: 14px 32px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  header h1 { font-size: 22px; color: var(--primary); }
  header h1 span { color: var(--muted); font-size: 14px; margin-left: 12px; }
  header .badge {
    background: var(--accent); color: var(--bg); font-size: 12px;
    font-weight: 700; padding: 3px 10px; border-radius: 20px;
  }
  .step-bar { display: flex; align-items: center; gap: 0; }
  .step { display: flex; align-items: center; gap: 6px; cursor: pointer; opacity: .5; transition: opacity .2s; }
  .step.active { opacity: 1; }
  .step.done { opacity: .8; }
  .step .step-num {
    width: 22px; height: 22px; border-radius: 50%; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    background: var(--line); color: var(--muted); transition: all .2s;
  }
  .step.active .step-num { background: var(--primary); color: var(--bg); }
  .step.done .step-num { background: var(--accent); color: var(--bg); }
  .step .step-label { font-size: 12px; color: var(--muted); }
  .step.active .step-label { color: var(--text); }
  .step-line { flex: 1; height: 1px; background: var(--line); margin: 0 10px; min-width: 20px; }
  /* ---- layout ---- */
  .main { display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: calc(100vh - 100px); }
  .left-panel { padding: 20px 24px; overflow-y: auto; max-height: calc(100vh - 100px); }
  .right-panel {
    padding: 20px 24px; background: var(--surface); overflow-y: auto;
    max-height: calc(100vh - 100px); border-left: 1px solid var(--line);
  }
  /* ---- section ---- */
  .section { margin-bottom: 24px; }
  .section h2 {
    font-size: 15px; color: var(--secondary); margin-bottom: 10px;
    border-bottom: 1px solid var(--line); padding-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .section h2 .num {
    background: var(--secondary); color: var(--bg); font-size: 11px;
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-weight: 700;
  }
  .section h2 .hint { margin-left: auto; font-size: 11px; color: var(--muted); font-weight: 400; }
  /* ---- template gallery ---- */
  .tmpl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .tmpl-card {
    background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 12px; cursor: pointer; transition: all .2s;
  }
  .tmpl-card:hover { border-color: var(--secondary); transform: translateY(-2px); }
  .tmpl-card.active { border-color: var(--primary); background: #1a2235; }
  .tmpl-card .label { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .tmpl-card .desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .tmpl-card .meta { font-size: 11px; margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
  .tmpl-card .meta span { background: rgba(88,166,255,.15); color: var(--secondary); padding: 1px 6px; border-radius: 4px; }
  .tmpl-card .meta span.mode-dark { background: rgba(13,17,23,.3); color: var(--muted); }
  .tmpl-card .meta span.mode-light { background: rgba(255,255,255,.1); color: var(--muted); }
  /* ---- form ---- */
  .form-row { display: flex; gap: 12px; margin-bottom: 10px; }
  .form-field { flex: 1; position: relative; }
  .form-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .form-field label .req { color: var(--danger); }
  .form-field label .tip { font-size: 10px; color: var(--muted); margin-left: 4px; opacity: .7; }
  input, select, textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--line);
    color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px;
    font-family: var(--font); transition: border-color .2s;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--secondary); }
  input.error, select.error, textarea.error { border-color: var(--danger); }
  input.warn, select.warn, textarea.warn { border-color: var(--warning); }
  textarea { resize: vertical; min-height: 50px; }
  .field-error { font-size: 11px; color: var(--danger); margin-top: 2px; display: none; }
  .field-error.show { display: block; }
  /* ---- delivery toggle ---- */
  .toggle-group { display: flex; gap: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .toggle-btn {
    flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 14px;
    background: var(--bg); color: var(--muted); transition: all .2s; border: none;
    font-family: var(--font);
  }
  .toggle-btn.active { background: var(--primary); color: var(--bg); font-weight: 600; }
  .toggle-btn .icon { font-size: 18px; display: block; margin-bottom: 2px; }
  .toggle-btn .note { font-size: 11px; opacity: .8; }
  /* ---- theme picker ---- */
  .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 8px; }
  .theme-card {
    border: 2px solid var(--line); border-radius: var(--radius); cursor: pointer;
    overflow: hidden; transition: all .2s; position: relative;
  }
  .theme-card:hover { border-color: var(--secondary); }
  .theme-card.active { border-color: var(--primary); }
  .theme-card .swatch-row { display: flex; height: 28px; }
  .theme-card .swatch-row div { flex: 1; }
  .theme-card .info { padding: 5px 8px; font-size: 12px; }
  .theme-card .info .name { font-weight: 600; display: flex; align-items: center; gap: 4px; }
  .theme-card .info .name .mode-tag { font-size: 9px; padding: 1px 4px; border-radius: 3px; font-weight: 400; }
  .theme-card .info .name .mode-dark { background: rgba(13,17,23,.5); color: #8B949E; }
  .theme-card .info .name .mode-light { background: rgba(255,255,255,.15); color: #8B949E; }
  .theme-card .info .contrast { font-size: 10px; margin-top: 2px; display: flex; gap: 4px; }
  .theme-card .info .contrast .grade { font-weight: 700; }
  .theme-card .custom-tag {
    position: absolute; top: 2px; right: 2px; font-size: 9px;
    background: var(--accent); color: var(--bg); padding: 1px 5px; border-radius: 3px;
  }
  /* ---- custom theme builder ---- */
  .builder-toggle {
    background: transparent; border: 1px dashed var(--secondary); color: var(--secondary);
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px;
    font-family: var(--font); margin-bottom: 10px; width: 100%;
  }
  .builder-toggle:hover { background: rgba(88,166,255,.1); }
  .builder-panel {
    background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px; display: none;
  }
  .builder-panel.open { display: block; }
  .builder-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
  .builder-field { display: flex; flex-direction: column; gap: 4px; }
  .builder-field label { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .builder-field .color-row { display: flex; align-items: center; gap: 6px; }
  .builder-field input[type="color"] {
    width: 36px; height: 30px; padding: 0; border: 1px solid var(--line); border-radius: 4px; cursor: pointer; background: none;
  }
  .builder-field input[type="text"] { flex: 1; font-size: 12px; padding: 5px 8px; font-family: "Cascadia Code", monospace; }
  .builder-preview {
    border-radius: 8px; padding: 16px; margin-bottom: 12px; min-height: 80px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .builder-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .builder-actions button {
    padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-weight: 600; font-family: var(--font);
  }
  .builder-actions .btn-save { background: var(--accent); color: var(--bg); }
  .builder-actions .btn-export { background: var(--secondary); color: var(--bg); }
  .builder-actions .btn-reset { background: transparent; border: 1px solid var(--line); color: var(--text); }
  .contrast-info { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .contrast-info .grade-tag { font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
  /* ---- page editor ---- */
  .page-item {
    background: var(--bg); border: 1px solid var(--line); border-radius: 6px;
    margin-bottom: 6px; transition: all .2s;
  }
  .page-item.dragging { opacity: .4; }
  .page-item.drag-over { border-color: var(--secondary); border-style: dashed; }
  .page-item-header {
    display: flex; gap: 8px; align-items: center; padding: 8px 10px; cursor: pointer;
  }
  .page-item-header .drag-handle {
    color: var(--muted); cursor: grab; font-size: 14px; flex-shrink: 0;
  }
  .page-item-header .pg-num {
    background: var(--secondary); color: var(--bg); font-size: 11px; font-weight: 700;
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .page-item-header .pg-type-icon { font-size: 16px; flex-shrink: 0; }
  .page-item-header .pg-title { flex: 1; font-size: 13px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .page-item-header .pg-type-label { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .page-item-header .expand-arrow { color: var(--muted); transition: transform .2s; flex-shrink: 0; }
  .page-item.expanded .expand-arrow { transform: rotate(90deg); }
  .page-item-body { display: none; padding: 0 10px 10px; }
  .page-item.expanded .page-item-body { display: block; }
  .page-item-body .body-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .page-item-body select { width: 130px; flex-shrink: 0; padding: 5px 8px; font-size: 12px; }
  .page-item-body input { font-size: 13px; padding: 5px 8px; }
  .page-item-body .items-editor { margin-top: 6px; }
  .page-item-body .items-editor .item-row { display: flex; gap: 6px; margin-bottom: 4px; align-items: center; }
  .page-item-body .items-editor .item-row input { font-size: 12px; padding: 4px 8px; }
  .page-item-body .items-editor .add-item-btn {
    background: transparent; border: 1px dashed var(--line); color: var(--muted);
    padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-family: var(--font);
  }
  .page-item-body .items-editor .add-item-btn:hover { border-color: var(--secondary); color: var(--secondary); }
  .page-item-body .del-btn {
    background: rgba(255,77,77,.2); color: var(--danger); border: none; cursor: pointer;
    width: 26px; height: 26px; border-radius: 6px; font-size: 16px; flex-shrink: 0;
  }
  .page-item-body .del-btn:hover { background: rgba(255,77,77,.4); }
  .add-page-btn {
    background: transparent; border: 1px dashed var(--line); color: var(--muted);
    padding: 8px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 13px;
    font-family: var(--font);
  }
  .add-page-btn:hover { border-color: var(--secondary); color: var(--secondary); }
  /* ---- layout picker modal ---- */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200;
    display: none; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    padding: 24px; max-width: 680px; width: 90%; max-height: 80vh; overflow-y: auto;
  }
  .modal h3 { font-size: 18px; color: var(--primary); margin-bottom: 16px; }
  .layout-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .layout-card {
    background: var(--bg); border: 2px solid var(--line); border-radius: var(--radius);
    padding: 14px; cursor: pointer; transition: all .2s;
  }
  .layout-card:hover { border-color: var(--secondary); transform: translateY(-2px); }
  .layout-card .layout-icon { font-size: 28px; margin-bottom: 8px; }
  .layout-card .layout-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .layout-card .layout-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
  .modal-close {
    position: absolute; top: 12px; right: 16px; background: none; border: none;
    color: var(--muted); font-size: 22px; cursor: pointer;
  }
  /* ---- preview ---- */
  .preview-slide {
    border-radius: var(--radius); overflow: hidden; margin-bottom: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,.4); aspect-ratio: 16/9; position: relative;
  }
  .preview-slide .slide-content { padding: 20px; height: 100%; display: flex; flex-direction: column; }
  .preview-nav { display: flex; gap: 8px; align-items: center; justify-content: center; margin-bottom: 16px; }
  .preview-nav button {
    background: var(--bg); border: 1px solid var(--line); color: var(--text);
    width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  .preview-nav button:hover { border-color: var(--secondary); }
  .preview-nav .pg-info { font-size: 13px; color: var(--muted); min-width: 60px; text-align: center; }
  .preview-nav .kb-hint { font-size: 10px; color: var(--muted); margin-left: 8px; }
  /* ---- export ---- */
  .export-panel { background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; }
  .export-btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px;
    border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
    font-family: var(--font); margin-right: 6px; margin-bottom: 6px; transition: all .2s;
  }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-secondary { background: var(--secondary); color: var(--bg); }
  .btn-outline { background: transparent; border: 1px solid var(--line); color: var(--text); }
  .export-btn:hover { opacity: .85; }
  .export-btn:disabled { opacity: .4; cursor: not-allowed; }
  .cmd-box {
    background: #050a10; border: 1px solid var(--line); border-radius: 6px;
    padding: 10px; font-family: "Cascadia Code", "Consolas", monospace; font-size: 12px;
    color: var(--accent); margin-top: 10px; overflow-x: auto; white-space: pre;
  }
  /* ---- toast ---- */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 13px;
    box-shadow: 0 4px 20px rgba(0,0,0,.4); opacity: 0; transform: translateX(40px);
    transition: all .3s;
  }
  .toast.show { opacity: 1; transform: translateX(0); }
  .toast.success { background: var(--success); color: var(--bg); }
  .toast.error { background: var(--danger); color: #fff; }
  .toast.info { background: var(--secondary); color: var(--bg); }
  .toast.warning { background: var(--warning); color: var(--bg); }
  /* ---- empty state ---- */
  .empty-state { text-align: center; padding: 20px; color: var(--muted); font-size: 13px; }
  /* ---- responsive ---- */
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .left-panel, .right-panel { max-height: none; }
    .builder-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <h1>PPT Pro Studio <span>控制台 — 简报编辑 + 实时预览</span></h1>
    <span class="badge">v1.3.0</span>
  </div>
  <div class="step-bar" id="stepBar">
    <div class="step active" data-step="1" onclick="goToStep(1)"><span class="step-num">1</span><span class="step-label">选模板</span></div>
    <div class="step-line"></div>
    <div class="step" data-step="2" onclick="goToStep(2)"><span class="step-num">2</span><span class="step-label">填信息</span></div>
    <div class="step-line"></div>
    <div class="step" data-step="3" onclick="goToStep(3)"><span class="step-num">3</span><span class="step-label">选主题</span></div>
    <div class="step-line"></div>
    <div class="step" data-step="4" onclick="goToStep(4)"><span class="step-num">4</span><span class="step-label">调大纲</span></div>
    <div class="step-line"></div>
    <div class="step" data-step="5" onclick="goToStep(5)"><span class="step-num">5</span><span class="step-label">导出</span></div>
  </div>
</header>

<div class="main">
  <!-- ===================== 左侧面板 ===================== -->
  <div class="left-panel">

    <!-- 1. 模板市场 -->
    <div class="section" id="sec-template">
      <h2><span class="num">1</span>模板市场 <span class="hint">点击模板自动填充</span></h2>
      <div class="tmpl-grid" id="tmplGrid"></div>
    </div>

    <!-- 2. 交付路径 -->
    <div class="section" id="sec-delivery">
      <h2><span class="num">2</span>交付路径</h2>
      <div class="toggle-group">
        <button class="toggle-btn active" data-delivery="editable" onclick="setDelivery('editable')">
          <span class="icon">&#9998;</span>可编辑 PPTX<span class="note">核心引擎，原生可编辑</span>
        </button>
        <button class="toggle-btn" data-delivery="showcase" onclick="setDelivery('showcase')">
          <span class="icon">&#127916;</span>演示天花板 HTML<span class="note">Marp 视觉震撼</span>
        </button>
      </div>
    </div>

    <!-- 3. 简报信息 -->
    <div class="section" id="sec-info">
      <h2><span class="num">3</span>简报信息 <span class="hint">* 为必填项</span></h2>
      <div class="form-row">
        <div class="form-field">
          <label>主题 <span class="req">*</span><span class="tip">演示文稿的核心标题</span></label>
          <input type="text" id="f_topic" placeholder="如：AI Agent 平台 2026 路线图" oninput="onFormInput('f_topic')">
          <div class="field-error" id="err_topic">请填写主题</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>受众<span class="tip">面向谁演讲</span></label>
          <input type="text" id="f_audience" placeholder="如：投资人 / 学员 / 客户 / 管理层" oninput="updatePreview()">
        </div>
        <div class="form-field">
          <label>目标<span class="tip">期望效果</span></label>
          <input type="text" id="f_goal" placeholder="如：说服 / 教学 / 汇报 / 销售" oninput="updatePreview()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>叙事结构<span class="tip">决定页面骨架</span></label>
          <select id="f_narrative" onchange="onNarrativeChange()">
            <option value="persuade">说服型 — 痛点 → 方案 → 证明 → 行动号召</option>
            <option value="inform">通知型 — 背景 → 数据 → 分析 → 结论</option>
            <option value="teach">教学型 — 目标 → 概念 → 案例 → 练习</option>
            <option value="inspire">激励型 — 愿景 → 故事 → 行动 → 邀请</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>页数<span class="tip">4-30 页</span></label>
          <input type="number" id="f_length" value="12" min="4" max="30" oninput="onFormInput('f_length')">
          <div class="field-error" id="err_length">页数应在 4-30 之间</div>
        </div>
        <div class="form-field">
          <label>章节数<span class="tip">2-10</span></label>
          <input type="number" id="f_sections" value="4" min="2" max="10" oninput="updatePreview()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>约束条件<span class="tip">如：不要动画、需要备注</span></label>
          <textarea id="f_constraints" placeholder="如：不要动画、必须 16:9、需要演讲者备注" oninput="updatePreview()"></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>验收标准<span class="tip">交付检查项</span></label>
          <textarea id="f_acceptance" placeholder="如：可编辑 / 无水印 / 中文正常" oninput="updatePreview()"></textarea>
        </div>
      </div>
    </div>

    <!-- 4. 主题市场 + 自定义 -->
    <div class="section" id="sec-theme">
      <h2><span class="num">4</span>主题市场 <span class="hint">含 WCAG 对比度检测</span></h2>
      <div class="theme-grid" id="themeGrid"></div>
      <button class="builder-toggle" id="builderToggle" onclick="toggleBuilder()">
        + 自定义主题
      </button>
      <div class="builder-panel" id="builderPanel">
        <div class="contrast-info" id="builderContrast"></div>
        <div class="builder-preview" id="builderPreview"></div>
        <div class="builder-grid">
          <div class="builder-field">
            <label>背景 bg</label>

const DELIVERY_LABELS = { editable:"可编辑", showcase:"演示天花板" };

// =====================================================================
// 状态
// =====================================================================
let state = {
  template: null,
  delivery: "editable",
  theme: "tech_dark",
  narrative: "persuade",
  pages: [],
  previewPage: 0,
  currentStep: 1,
  customThemes: JSON.parse(localStorage.getItem("ppt_custom_themes") || "{}"),
  expandedPage: -1,
};

// =====================================================================
// WCAG 对比度计算
// =====================================================================
function hexToRgb(hex) {
  hex = hex.replace("#", "");
  return { r: parseInt(hex.substr(0,2),16), g: parseInt(hex.substr(2,2),16), b: parseInt(hex.substr(4,2),16) };
}
function relLuminance(rgb) {
  const {r,g,b} = rgb;
  const rs=r/255, gs=g/255, bs=b/255;
  const R = rs<=0.03928 ? rs/12.92 : Math.pow((rs+0.055)/1.055, 2.4);
  const G = gs<=0.03928 ? gs/12.92 : Math.pow((gs+0.055)/1.055, 2.4);
  const B = bs<=0.03928 ? bs/12.92 : Math.pow((bs+0.055)/1.055, 2.4);
  return 0.2126*R + 0.7152*G + 0.0722*B;
}
function contrastRatio(hex1, hex2) {
  const L1 = relLuminance(hexToRgb(hex1));
  const L2 = relLuminance(hexToRgb(hex2));
  return ((Math.max(L1,L2)+0.05) / (Math.min(L1,L2)+0.05)).toFixed(1);
}
function contrastGrade(ratio) {
  ratio = parseFloat(ratio);
  if (ratio >= 7) return { label:"AAA", color:"#3FB950" };
  if (ratio >= 4.5) return { label:"AA", color:"#58A6FF" };
  if (ratio >= 3) return { label:"AA Large", color:"#F2B705" };
  return { label:"不达标", color:"#FF4D4D" };
}

// =====================================================================
// 初始化
// =====================================================================
function init() {
  renderTemplateGrid();
  renderThemeGrid();
  renderLayoutGrid();
  applyTemplate("startup_pitch");
  updatePreview();
  updateStepBar();
}

// =====================================================================
// 步骤引导条
// =====================================================================
function updateStepBar() {
  const steps = document.querySelectorAll(".step");
  steps.forEach((s, i) => {
    s.classList.remove("active", "done");
    if (i + 1 < state.currentStep) s.classList.add("done");
    else if (i + 1 === state.currentStep) s.classList.add("active");
  });
}

function goToStep(step) {
  state.currentStep = step;
  updateStepBar();
  const sections = ["sec-template","sec-info","sec-theme","sec-pages","sec-info"];
  const targets = ["sec-template","sec-delivery","sec-info","sec-theme","sec-pages"];
  // scroll to the target section
  const map = { 1:"sec-template", 2:"sec-info", 3:"sec-theme", 4:"sec-pages", 5:"sec-pages" };
  const el = document.getElementById(map[step]);
  if (el) el.scrollIntoView({ behavior:"smooth", block:"start" });
}

function advanceStep(step) {
  if (state.currentStep <= step) {
    state.currentStep = step + 1;
    updateStepBar();
  }
}

// =====================================================================
// 模板市场
// =====================================================================
function renderTemplateGrid() {
  const grid = document.getElementById("tmplGrid");
  grid.innerHTML = "";
  for (const [id, t] of Object.entries(TEMPLATES)) {
    const card = document.createElement("div");
    card.className = "tmpl-card";
    card.dataset.id = id;
    const themeMode = THEMES[t.theme]?.mode || "dark";
    card.innerHTML = `
      <div class="label">${t.label}</div>
      <div class="desc">${t.desc}</div>
      <div class="meta">
        <span>${NARRATIVE_LABELS[t.narrative]}</span>
        <span>${DELIVERY_LABELS[t.delivery]}</span>
        <span>${t.pages.length} 页</span>
        <span class="mode-${themeMode}">${themeMode === "dark" ? "深色" : "浅色"}</span>
      </div>`;
    card.onclick = () => applyTemplate(id);
    grid.appendChild(card);
  }
}

function applyTemplate(id) {
  const t = TEMPLATES[id];
  if (!t) return;
  state.template = id;
  state.delivery = t.delivery;
  state.theme = t.theme;
  state.narrative = t.narrative;
  state.pages = JSON.parse(JSON.stringify(t.pages));
  state.previewPage = 0;
  state.expandedPage = -1;

  document.querySelectorAll(".tmpl-card").forEach(c => c.classList.toggle("active", c.dataset.id === id));

  document.getElementById("f_topic").value = t.label;
  document.getElementById("f_audience").value = "";
  document.getElementById("f_goal").value = NARRATIVE_LABELS[t.narrative];
  document.getElementById("f_narrative").value = t.narrative;
  document.getElementById("f_length").value = t.pages.length;
  document.getElementById("f_sections").value = Math.max(3, Math.min(6, Math.floor(t.pages.length / 2)));
  document.getElementById("f_constraints").value = "";
  document.getElementById("f_acceptance").value = t.delivery === "editable" ? "可编辑 / 无水印 / 中文正常" : "视觉震撼，适合演示/路演";

  clearFieldError("f_topic"); clearFieldError("f_length");

  document.querySelectorAll(".toggle-btn").forEach(b => b.classList.toggle("active", b.dataset.delivery === state.delivery));

  renderThemeGrid();
  renderPages();
  updatePreview();
  advanceStep(1);
}

// =====================================================================
// 交付路径
// =====================================================================
function setDelivery(d) {
  state.delivery = d;
  document.querySelectorAll(".toggle-btn").forEach(b => b.classList.toggle("active", b.dataset.delivery === d));
  document.getElementById("f_acceptance").value = d === "editable" ? "可编辑 / 无水印 / 中文正常" : "视觉震撼，适合演示/路演";
  updatePreview();
}

// =====================================================================
// 主题市场（含对比度检测）
// =====================================================================
function renderThemeGrid() {
  const grid = document.getElementById("themeGrid");
  grid.innerHTML = "";
  const allThemes = { ...THEMES, ...state.customThemes };
  for (const [id, t] of Object.entries(allThemes)) {
    const isCustom = !!state.customThemes[id];
    const textBgRatio = contrastRatio(t.text, t.bg);
    const grade = contrastGrade(textBgRatio);
    const card = document.createElement("div");
    card.className = "theme-card" + (id === state.theme ? " active" : "");
    card.innerHTML = `
      <div class="swatch-row">
        <div style="background:#${t.bg}"></div>
        <div style="background:#${t.surface}"></div>
        <div style="background:#${t.primary}"></div>
        <div style="background:#${t.secondary}"></div>
        <div style="background:#${t.accent}"></div>
      </div>
      <div class="info">
        <div class="name">${t.label}
          <span class="mode-tag mode-${t.mode || "dark"}">${t.mode === "light" ? "浅色" : "深色"}</span>
          ${isCustom ? '<span class="custom-tag">自定义</span>' : ""}
        </div>
        <div class="contrast">
          <span>文/底 ${textBgRatio}:1</span>
          <span class="grade" style="color:${grade.color}">${grade.label}</span>
        </div>
      </div>`;
    card.onclick = () => { state.theme = id; renderThemeGrid(); updatePreview(); advanceStep(3); };
    grid.appendChild(card);
  }
}

// =====================================================================
// 自定义主题构建器
// =====================================================================
function toggleBuilder() {
  const panel = document.getElementById("builderPanel");
  const toggle = document.getElementById("builderToggle");
  if (panel.classList.contains("open")) {
    panel.classList.remove("open");
    toggle.textContent = "+ 自定义主题";
  } else {
    panel.classList.add("open");
    toggle.textContent = "— 收起自定义";
    // initialize from current theme
    const allThemes = { ...THEMES, ...state.customThemes };
    const t = allThemes[state.theme] || THEMES.tech_dark;
    for (const k of ["bg","surface","primary","secondary","text","muted","accent","line"]) {
      document.getElementById("ct_" + k).value = "#" + t[k];
      document.getElementById("ct_" + k + "_hex").value = t[k];
    }
    document.getElementById("ct_font").value = t.font || "Microsoft YaHei";
    updateBuilderPreview();
  }
}

function onBuilderColor(key) {
  const color = document.getElementById("ct_" + key).value;
  document.getElementById("ct_" + key + "_hex").value = color.replace("#", "").toUpperCase();
  updateBuilderPreview();
}

function onBuilderHex(key) {
  let hex = document.getElementById("ct_" + key + "_hex").value.replace(/[^0-9A-Fa-f]/g, "").toUpperCase();
  if (hex.length === 6) {
    document.getElementById("ct_" + key).value = "#" + hex;
    updateBuilderPreview();
  }
}

function getBuilderTheme() {
  const t = {};
  for (const k of ["bg","surface","primary","secondary","text","muted","accent","line"]) {
    t[k] = document.getElementById("ct_" + k + "_hex").value.toUpperCase();
  }
  t.font = document.getElementById("ct_font").value;
  t.label = "自定义主题";
  t.mode = relLuminance(hexToRgb(t.bg)) < 0.5 ? "dark" : "light";
  return t;
}

function updateBuilderPreview() {
  const t = getBuilderTheme();
  const preview = document.getElementById("builderPreview");
  preview.style.background = `#${t.bg}`;
  preview.innerHTML = `
    <div style="color:#${t.primary}; font-size:18px; font-weight:700; margin-bottom:6px; font-family:${t.font}">标题预览</div>
    <div style="color:#${t.text}; font-size:14px; margin-bottom:4px; font-family:${t.font}">正文内容示例 — 这是一个自定义主题的预览效果</div>
    <div style="display:flex; gap:8px; margin-top:8px;">
      <span style="background:#${t.accent}; color:#${t.bg}; padding:3px 10px; border-radius:4px; font-size:12px; font-weight:600;">强调按钮</span>
      <span style="background:#${t.surface}; color:#${t.secondary}; padding:3px 10px; border-radius:4px; font-size:12px;">辅助标签</span>
    </div>`;

  // contrast info
  const textBg = contrastRatio(t.text, t.bg);
  const primaryBg = contrastRatio(t.primary, t.bg);
  const accentBg = contrastRatio(t.accent, t.bg);
  const g1 = contrastGrade(textBg);
  const g2 = contrastGrade(primaryBg);
  const g3 = contrastGrade(accentBg);
  document.getElementById("builderContrast").innerHTML =
    `对比度 — 文/底: <span class="grade-tag" style="background:${g1.color};color:#000">${textBg}:1 ${g1.label}</span> ` +
    `主色/底: <span class="grade-tag" style="background:${g2.color};color:#000">${primaryBg}:1 ${g2.label}</span> ` +
    `强调/底: <span class="grade-tag" style="background:${g3.color};color:#000">${accentBg}:1 ${g3.label}</span>`;
}

function saveCustomTheme() {
  const t = getBuilderTheme();
  const id = "custom_" + Date.now();
  state.customThemes[id] = t;
  localStorage.setItem("ppt_custom_themes", JSON.stringify(state.customThemes));
  state.theme = id;
  renderThemeGrid();
  showToast("自定义主题已保存", "success");
}

function exportCustomTheme() {
  const t = getBuilderTheme();
  const blob = new Blob([JSON.stringify(t, null, 2) + "\n"], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "custom_theme.json";
  a.click();
  URL.revokeObjectURL(a.href);
  showToast("主题 JSON 已导出", "success");
}

function resetBuilder() {
  const t = THEMES.tech_dark;
  for (const k of ["bg","surface","primary","secondary","text","muted","accent","line"]) {
    document.getElementById("ct_" + k).value = "#" + t[k];
    document.getElementById("ct_" + k + "_hex").value = t[k];
  }
  document.getElementById("ct_font").value = "Microsoft YaHei";
  updateBuilderPreview();
  showToast("已重置为默认配色", "info");
}

// =====================================================================
// 叙事结构切换
// =====================================================================
function onNarrativeChange() {
  const n = document.getElementById("f_narrative").value;
  state.narrative = n;
  const skeleton = NARRATIVE_SKELETONS[n];
  if (!skeleton) return;
  if (state.pages.length === skeleton.length) {
    state.pages.forEach((pg, i) => { pg.type = skeleton[i].type; });
  } else {
    state.pages = skeleton.map(s => ({ type: s.type, title: s.purpose, items: [] }));
  }
  state.previewPage = 0;
  document.getElementById("f_length").value = state.pages.length;
  renderPages();
  updatePreview();
}

// =====================================================================
// 表单校验
// =====================================================================
function onFormInput(fieldId) {
  validateField(fieldId);
  updatePreview();
  advanceStep(2);
}

function validateField(fieldId) {
  const el = document.getElementById(fieldId);
  const errEl = document.getElementById("err_" + fieldId.replace("f_", ""));
  let valid = true;
  let warn = false;

  if (fieldId === "f_topic") {
    if (!el.value.trim()) {
      el.classList.add("error");
      if (errEl) errEl.classList.add("show");
      valid = false;
    } else {
      el.classList.remove("error");
      if (errEl) errEl.classList.remove("show");
    }
  }

  if (fieldId === "f_length") {
    const v = parseInt(el.value);
    if (isNaN(v) || v < 4 || v > 30) {
      el.classList.add("error");
      if (errEl) errEl.classList.add("show");
      valid = false;
    } else {
      el.classList.remove("error");
      if (errEl) errEl.classList.remove("show");
    }
  }

  return valid;
}

function clearFieldError(fieldId) {
  const el = document.getElementById(fieldId);
  const errId = "err_" + fieldId.replace("f_", "");
  const errEl = document.getElementById(errId);
  if (el) el.classList.remove("error", "warn");
  if (errEl) errEl.classList.remove("show");
}

function validateAll() {
  const ok1 = validateField("f_topic");
  const ok2 = validateField("f_length");
  if (!ok1) {
    showToast("请填写主题（必填）", "error");
    document.getElementById("f_topic").focus();
    return false;
  }
  if (!ok2) {
    showToast("页数应在 4-30 之间", "error");
    return false;
  }
  if (state.pages.length === 0) {
    showToast("请至少添加一个页面", "error");
    return false;
  }
  return true;
}

// =====================================================================
// 页面编辑器（拖拽排序 + 可展开 + 布局选择器）
// =====================================================================
function renderPages() {
  const list = document.getElementById("pageList");
  list.innerHTML = "";
  if (state.pages.length === 0) {
    list.innerHTML = '<div class="empty-state">暂无页面，点击下方按钮添加</div>';
    return;
  }
  state.pages.forEach((pg, i) => {
    const div = document.createElement("div");
    div.className = "page-item" + (state.expandedPage === i ? " expanded" : "");
    div.draggable = true;
    div.dataset.idx = i;

    let typeOpts = PAGE_TYPES.map(t =>
      `<option value="${t}" ${t === pg.type ? "selected" : ""}>${PAGE_TYPE_ICONS[t] || ""} ${PAGE_TYPE_LABELS[t]}</option>`
    ).join("");

    const items = pg.items || [];
    let itemsHtml = items.map((item, j) => `
      <div class="item-row">
        <input type="text" value="${escAttr(item)}" placeholder="要点内容"
               oninput="updatePageItem(${i}, ${j}, this.value)">
        <button class="del-btn" onclick="delPageItem(${i}, ${j})" style="width:24px;height:24px;font-size:14px">&times;</button>
      </div>`).join("");
    if (items.length === 0 && ["content","two_column","list_page","detail_page","form_page","dashboard","comparison","stats","media"].includes(pg.type)) {
      itemsHtml = '<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">该布局支持要点，点击下方添加</div>';
    }

    div.innerHTML = `
      <div class="page-item-header" onclick="toggleExpandPage(${i})">
        <span class="drag-handle" title="拖拽排序">⋮⋮</span>
        <div class="pg-num">${i + 1}</div>
        <span class="pg-type-icon">${PAGE_TYPE_ICONS[pg.type] || "📄"}</span>
        <span class="pg-type-label">${PAGE_TYPE_LABELS[pg.type] || pg.type}</span>
        <span class="pg-title">${escHtml(pg.title || "(未命名)")}</span>
        <span class="expand-arrow">▶</span>
      </div>
      <div class="page-item-body">
        <div class="body-row">
          <select onchange="updatePageType(${i}, this.value)">${typeOpts}</select>
          <input type="text" value="${escAttr(pg.title || "")}" placeholder="页面标题"
                 oninput="updatePageTitle(${i}, this.value)">
          <button class="del-btn" onclick="delPage(${i})" title="删除此页">&times;</button>
        </div>
        <div class="items-editor">
          ${itemsHtml}
          <button class="add-item-btn" onclick="addPageItem(${i})">+ 添加要点</button>
        </div>
      </div>`;

    // drag events
    div.addEventListener("dragstart", onDragStart);
    div.addEventListener("dragover", onDragOver);
    div.addEventListener("drop", onDrop);
    div.addEventListener("dragend", onDragEnd);
    div.addEventListener("dragleave", onDragLeave);

    list.appendChild(div);
  });
}

let dragIdx = null;

function onDragStart(e) {
  dragIdx = parseInt(this.dataset.idx);
  this.classList.add("dragging");
  e.dataTransfer.effectAllowed = "move";
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  this.classList.add("drag-over");
}
function onDragLeave() { this.classList.remove("drag-over"); }
function onDrop(e) {
  e.preventDefault();
  this.classList.remove("drag-over");
  const dropIdx = parseInt(this.dataset.idx);
  if (dragIdx !== null && dragIdx !== dropIdx) {
    const [moved] = state.pages.splice(dragIdx, 1);
    state.pages.splice(dropIdx, 0, moved);
    renderPages();
    updatePreview();
  }
}
function onDragEnd() {
  document.querySelectorAll(".page-item").forEach(el => el.classList.remove("dragging", "drag-over"));
  dragIdx = null;
}

function toggleExpandPage(i) {
  state.expandedPage = state.expandedPage === i ? -1 : i;
  renderPages();
}

function updatePageType(i, val) { state.pages[i].type = val; updatePreview(); }
function updatePageTitle(i, val) { state.pages[i].title = val; updatePreview(); renderPages(); }
function updatePageItem(i, j, val) { state.pages[i].items[j] = val; updatePreview(); }
function addPageItem(i) {
  if (!state.pages[i].items) state.pages[i].items = [];
  state.pages[i].items.push("");
  renderPages();
  // re-expand
  state.expandedPage = i;
  renderPages();
}
function delPageItem(i, j) {
  state.pages[i].items.splice(j, 1);
  state.expandedPage = i;
  renderPages();
  updatePreview();
}

function delPage(i) {
  state.pages.splice(i, 1);
  if (state.expandedPage === i) state.expandedPage = -1;
  else if (state.expandedPage > i) state.expandedPage--;
  if (state.previewPage >= state.pages.length) state.previewPage = Math.max(0, state.pages.length - 1);
  renderPages();
  updatePreview();
  showToast("页面已删除", "info");
}

// =====================================================================
// 布局选择器弹窗
// =====================================================================
function renderLayoutGrid() {
  const grid = document.getElementById("layoutGrid");
  grid.innerHTML = "";
  // show all 18 types
  for (const [type, info] of Object.entries(LAYOUT_TEMPLATES)) {
    const card = document.createElement("div");
    card.className = "layout-card";
    card.innerHTML = `
      <div class="layout-icon">${info.icon}</div>
      <div class="layout-name">${info.label}</div>
      <div class="layout-desc">${info.desc}</div>`;
    card.onclick = () => addLayoutPage(type);
    grid.appendChild(card);
  }
  // also show existing types that aren't in LAYOUT_TEMPLATES
  for (const type of PAGE_TYPES) {
    if (LAYOUT_TEMPLATES[type]) continue;
    const card = document.createElement("div");
    card.className = "layout-card";
    card.innerHTML = `
      <div class="layout-icon">${PAGE_TYPE_ICONS[type] || "📄"}</div>
      <div class="layout-name">${PAGE_TYPE_LABELS[type]}</div>
      <div class="layout-desc">标准页面布局</div>`;
    card.onclick = () => addLayoutPage(type);
    grid.appendChild(card);
  }
}

function openLayoutPicker() {
  document.getElementById("layoutModal").classList.add("show");
}

function closeLayoutPicker() {
  document.getElementById("layoutModal").classList.remove("show");
}

function addLayoutPage(type) {
  const lt = LAYOUT_TEMPLATES[type];
  const newPage = {
    type: type,
    title: lt ? lt.defaultTitle : "",
    items: lt ? [...lt.defaultItems] : [],
  };
  state.pages.push(newPage);
  state.expandedPage = state.pages.length - 1;
  document.getElementById("f_length").value = state.pages.length;
  renderPages();
  updatePreview();
  closeLayoutPicker();
  advanceStep(4);
  showToast(`已添加${PAGE_TYPE_LABELS[type]}`, "success");
}

// =====================================================================
// 构建 Brief JSON
// =====================================================================
function buildBrief() {
  return {
    template: state.template || "",
    topic: val("f_topic"),
    audience: val("f_audience"),
    goal: val("f_goal"),
    narrative: state.narrative,
    delivery: state.delivery,
    theme: state.theme,
    length: parseInt(val("f_length")) || state.pages.length,
    sections: parseInt(val("f_sections")) || 4,
    constraints: val("f_constraints"),
    acceptance: val("f_acceptance"),
    pages: state.pages,
  };
}

function val(id) { return document.getElementById(id).value.trim(); }

// =====================================================================
// 实时预览（支持全部 18 种页面类型）
// =====================================================================
function updatePreview() {
  const brief = buildBrief();
  const allThemes = { ...THEMES, ...state.customThemes };
  const theme = allThemes[state.theme] || THEMES.tech_dark;
  const slide = document.getElementById("previewSlide");
  const content = document.getElementById("previewContent");

  slide.style.background = `#${theme.bg}`;

  const pgIdx = Math.min(state.previewPage, state.pages.length - 1);
  const pg = state.pages[pgIdx] || { type: "cover", title: brief.topic };

  const tc = `#${theme.primary}`;   // title color
  const xc = `#${theme.text}`;      // text color
  const mc = `#${theme.muted}`;     // muted color
  const ac = `#${theme.accent}`;    // accent color
  const sc = `#${theme.surface}`;   // surface color
  const scd = `#${theme.secondary}`; // secondary color
  const lc = `#${theme.line}`;      // line color
  const bgc = `#${theme.bg}`;       // bg color
  const font = theme.font || "Microsoft YaHei";

  content.style.fontFamily = font;
  let html = "";

  switch (pg.type) {
    case "cover":
      html = `<div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
        <div style="font-size:11px;color:${ac};letter-spacing:3px;margin-bottom:8px;">${escHtml(brief.topic || "未命名")}</div>
        <div style="font-size:28px;font-weight:700;color:${tc};line-height:1.3;">${escHtml(pg.title || "幻灯片标题")}</div>
        ${brief.audience ? `<div style="font-size:13px;color:${mc};margin-top:12px;">面向 ${escHtml(brief.audience)}</div>` : ""}
      </div>`;
      break;

function prevPreviewPage() { if (state.previewPage > 0) { state.previewPage--; updatePreview(); } }
function nextPreviewPage() { if (state.previewPage < state.pages.length - 1) { state.previewPage++; updatePreview(); } }

// =====================================================================
// 导出
// =====================================================================
function downloadBrief() {
  if (!validateAll()) return;
  const brief = buildBrief();
  const blob = new Blob([JSON.stringify(brief, null, 2) + "\n"], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "brief.json";
  a.click();
  URL.revokeObjectURL(a.href);
  showToast("brief.json 已下载", "success");
  advanceStep(5);
}

function copyBrief() {
  if (!validateAll()) return;
  const brief = buildBrief();
  navigator.clipboard.writeText(JSON.stringify(brief, null, 2)).then(
    () => showToast("简报 JSON 已复制到剪贴板", "success"),
    () => showToast("复制失败，请手动选择 JSON", "error")
  );
}

function copyCommand() {
  const ext = state.delivery === "showcase" ? "html" : "pptx";
  const cmd = `python3 scripts/generate.py brief.json --out output/deck.${ext}`;
  navigator.clipboard.writeText(cmd).then(
    () => showToast("命令已复制", "success"),
    () => showToast("复制失败", "error")
  );
}

// =====================================================================
// Toast（多类型）
// =====================================================================
function showToast(msg, type = "success") {
  const container = document.getElementById("toastContainer");
  const t = document.createElement("div");
  t.className = `toast ${type}`;
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => t.classList.add("show"), 10);
  setTimeout(() => { t.classList.remove("show"); setTimeout(() => t.remove(), 300); }, 2500);
}

// =====================================================================
// 键盘快捷键
// =====================================================================
document.addEventListener("keydown", (e) => {
  // don't intercept when typing in inputs
  if (["INPUT","TEXTAREA","SELECT"].includes(e.target.tagName)) {
    if (e.ctrlKey && e.key === "s") { e.preventDefault(); copyBrief(); }
    return;
  }
  if (e.key === "ArrowLeft") { e.preventDefault(); prevPreviewPage(); }
  else if (e.key === "ArrowRight") { e.preventDefault(); nextPreviewPage(); }
  else if (e.ctrlKey && e.key === "d") { e.preventDefault(); downloadBrief(); }
  else if (e.ctrlKey && e.key === "s") { e.preventDefault(); copyBrief(); }
  else if (e.key === "Escape") { closeLayoutPicker(); }
});

// close modal on overlay click
document.getElementById("layoutModal").addEventListener("click", (e) => {
  if (e.target.id === "layoutModal") closeLayoutPicker();
});

// =====================================================================
// 工具函数
// =====================================================================
function escHtml(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function escAttr(s) {
  if (!s) return "";
  return String(s).replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// =====================================================================
// 启动
// =====================================================================
init();
