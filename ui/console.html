<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPT Pro Studio — 控制台</title>
<style>
  :root {
    --bg: #0D1117; --surface: #151D2E; --primary: #D4A060;
    --secondary: #58A6FF; --text: #FFFFFF; --muted: #8B949E;
    --accent: #3FB950; --line: #30363D; --radius: 10px;
    --font: "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    line-height: 1.6; min-height: 100vh; padding: 0;
  }
  /* ---- header ---- */
  header {
    background: linear-gradient(135deg, var(--surface), #1a2438);
    border-bottom: 2px solid var(--primary); padding: 18px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 22px; color: var(--primary); }
  header h1 span { color: var(--muted); font-size: 14px; margin-left: 12px; }
  header .badge {
    background: var(--accent); color: var(--bg); font-size: 12px;
    font-weight: 700; padding: 3px 10px; border-radius: 20px;
  }
  /* ---- layout ---- */
  .main { display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: calc(100vh - 64px); }
  .left-panel { padding: 24px; overflow-y: auto; max-height: calc(100vh - 64px); }
  .right-panel {
    padding: 24px; background: var(--surface); overflow-y: auto;
    max-height: calc(100vh - 64px); border-left: 1px solid var(--line);
  }
  /* ---- section ---- */
  .section { margin-bottom: 28px; }
  .section h2 {
    font-size: 15px; color: var(--secondary); margin-bottom: 12px;
    border-bottom: 1px solid var(--line); padding-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .section h2 .num {
    background: var(--secondary); color: var(--bg); font-size: 11px;
    width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-weight: 700;
  }
  /* ---- template gallery ---- */
  .tmpl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
  .tmpl-card {
    background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px; cursor: pointer; transition: all .2s;
  }
  .tmpl-card:hover { border-color: var(--secondary); transform: translateY(-2px); }
  .tmpl-card.active { border-color: var(--primary); background: #1a2235; }
  .tmpl-card .label { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .tmpl-card .desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
  .tmpl-card .meta { font-size: 11px; color: var(--accent); margin-top: 6px; display: flex; gap: 8px; }
  .tmpl-card .meta span { background: rgba(63,185,80,.15); padding: 1px 6px; border-radius: 4px; }
  /* ---- form ---- */
  .form-row { display: flex; gap: 12px; margin-bottom: 12px; }
  .form-field { flex: 1; }
  .form-field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  input, select, textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--line);
    color: var(--text); padding: 8px 12px; border-radius: 6px; font-size: 14px;
    font-family: var(--font);
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--secondary); }
  textarea { resize: vertical; min-height: 60px; }
  /* ---- theme picker ---- */
  .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
  .theme-card {
    border: 2px solid var(--line); border-radius: var(--radius); cursor: pointer;
    overflow: hidden; transition: all .2s;
  }
  .theme-card:hover { border-color: var(--secondary); }
  .theme-card.active { border-color: var(--primary); }
  .theme-card .swatch-row { display: flex; height: 32px; }
  .theme-card .swatch-row div { flex: 1; }
  .theme-card .info { padding: 6px 8px; font-size: 12px; }
  .theme-card .info .name { font-weight: 600; }
  .theme-card .info .hint { font-size: 10px; color: var(--muted); }
  /* ---- delivery toggle ---- */
  .toggle-group { display: flex; gap: 0; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .toggle-btn {
    flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 14px;
    background: var(--bg); color: var(--muted); transition: all .2s; border: none;
    font-family: var(--font);
  }
  .toggle-btn.active { background: var(--primary); color: var(--bg); font-weight: 600; }
  .toggle-btn .icon { font-size: 18px; display: block; margin-bottom: 2px; }
  .toggle-btn .note { font-size: 11px; opacity: .8; }
  /* ---- page editor ---- */
  .page-item {
    background: var(--bg); border: 1px solid var(--line); border-radius: 6px;
    padding: 10px; margin-bottom: 8px; display: flex; gap: 8px; align-items: start;
  }
  .page-item .pg-num {
    background: var(--secondary); color: var(--bg); font-size: 11px; font-weight: 700;
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .page-item select { width: 110px; flex-shrink: 0; padding: 5px 8px; font-size: 12px; }
  .page-item input { font-size: 13px; padding: 5px 8px; }
  .page-item .del-btn {
    background: rgba(255,77,77,.2); color: #FF4D4D; border: none; cursor: pointer;
    width: 26px; height: 26px; border-radius: 6px; font-size: 16px; flex-shrink: 0;
  }
  .page-item .del-btn:hover { background: rgba(255,77,77,.4); }
  .add-page-btn {
    background: transparent; border: 1px dashed var(--line); color: var(--muted);
    padding: 8px; width: 100%; border-radius: 6px; cursor: pointer; font-size: 13px;
    font-family: var(--font);
  }
  .add-page-btn:hover { border-color: var(--secondary); color: var(--secondary); }
  /* ---- preview ---- */
  .preview-slide {
    border-radius: var(--radius); overflow: hidden; margin-bottom: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,.4); aspect-ratio: 16/9; position: relative;
  }
  .preview-slide .slide-content { padding: 24px; height: 100%; display: flex; flex-direction: column; }
  .preview-nav { display: flex; gap: 8px; align-items: center; justify-content: center; margin-bottom: 16px; }
  .preview-nav button {
    background: var(--bg); border: 1px solid var(--line); color: var(--text);
    width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 14px;
  }
  .preview-nav .pg-info { font-size: 13px; color: var(--muted); min-width: 60px; text-align: center; }
  /* ---- export ---- */
  .export-panel { background: var(--bg); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; }
  .export-btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px;
    border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
    font-family: var(--font); margin-right: 8px; margin-bottom: 8px; transition: all .2s;
  }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-secondary { background: var(--secondary); color: var(--bg); }
  .btn-outline { background: transparent; border: 1px solid var(--line); color: var(--text); }
  .export-btn:hover { opacity: .85; }
  .cmd-box {
    background: #050a10; border: 1px solid var(--line); border-radius: 6px;
    padding: 12px; font-family: "Cascadia Code", "Consolas", monospace; font-size: 13px;
    color: var(--accent); margin-top: 12px; overflow-x: auto; white-space: pre;
  }
  /* ---- toast ---- */
  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--accent);
    color: var(--bg); padding: 12px 24px; border-radius: 8px; font-weight: 600;
    font-size: 14px; z-index: 999; opacity: 0; transition: opacity .3s;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
  }
  .toast.show { opacity: 1; }
  /* ---- responsive ---- */
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .left-panel, .right-panel { max-height: none; }
  }
</style>
</head>
<body>

<header>
  <h1>PPT Pro Studio <span>控制台 — 简报编辑 + 实时预览</span></h1>
  <span class="badge">v1.2.0</span>
</header>

<div class="main">
  <!-- ===================== 左侧面板（表单） ===================== -->
  <div class="left-panel">

    <!-- 1. 模板市场 -->
    <div class="section">
      <h2><span class="num">1</span>模板市场</h2>
      <div class="tmpl-grid" id="tmplGrid"></div>
    </div>

    <!-- 2. 交付路径 -->
    <div class="section">
      <h2><span class="num">2</span>交付路径</h2>
      <div class="toggle-group">
        <button class="toggle-btn active" data-delivery="editable" onclick="setDelivery('editable')">
          <span class="icon">&#9998;</span>
          可编辑 PPTX
          <span class="note">核心引擎，原生可编辑</span>
        </button>
        <button class="toggle-btn" data-delivery="showcase" onclick="setDelivery('showcase')">
          <span class="icon">&#127916;</span>
          演示天花板 HTML
          <span class="note">Marp 视觉震撼</span>
        </button>
      </div>
    </div>

    <!-- 3. 简报信息 -->
    <div class="section">
      <h2><span class="num">3</span>简报信息</h2>
      <div class="form-row">
        <div class="form-field">
          <label>主题 *</label>
          <input type="text" id="f_topic" placeholder="如：AI Agent 平台 2026 路线图" oninput="updatePreview()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>受众</label>
          <input type="text" id="f_audience" placeholder="如：投资人 / 学员 / 客户 / 管理层" oninput="updatePreview()">
        </div>
        <div class="form-field">
          <label>目标</label>
          <input type="text" id="f_goal" placeholder="如：说服 / 教学 / 汇报 / 销售" oninput="updatePreview()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>叙事结构</label>
          <select id="f_narrative" onchange="onNarrativeChange()">
            <option value="persuade">说服型 — 痛点 → 方案 → 证明 → 行动号召</option>
            <option value="inform">通知型 — 背景 → 数据 → 分析 → 结论</option>
            <option value="teach">教学型 — 目标 → 概念 → 案例 → 练习</option>
            <option value="inspire">激励型 — 愿景 → 故事 → 行动 → 邀请</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>页数</label>
          <input type="number" id="f_length" value="12" min="4" max="30" oninput="updatePreview()">
        </div>
        <div class="form-field">
          <label>章节数</label>
          <input type="number" id="f_sections" value="4" min="2" max="10" oninput="updatePreview()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>约束条件</label>
          <textarea id="f_constraints" placeholder="如：不要动画、必须 16:9、需要演讲者备注" oninput="updatePreview()"></textarea>
        </div>
      </div>
      <div class="form-row">
        <div class="form-field">
          <label>验收标准</label>
          <textarea id="f_acceptance" placeholder="如：可编辑 / 无水印 / 中文正常" oninput="updatePreview()"></textarea>
        </div>
      </div>
    </div>

    <!-- 4. 主题市场 -->
    <div class="section">
      <h2><span class="num">4</span>主题市场</h2>
      <div class="theme-grid" id="themeGrid"></div>
    </div>

    <!-- 5. 页面大纲 -->
    <div class="section">
      <h2><span class="num">5</span>页面大纲</h2>
      <div id="pageList"></div>
      <button class="add-page-btn" onclick="addPage()">+ 添加页面</button>
    </div>

  </div><!-- /left-panel -->

  <!-- ===================== 右侧面板（预览 + 导出） ===================== -->
  <div class="right-panel">

    <!-- 实时预览 -->
    <div class="section">
      <h2>实时预览</h2>
      <div class="preview-slide" id="previewSlide">
        <div class="slide-content" id="previewContent"></div>
      </div>
      <div class="preview-nav">
        <button onclick="prevPreviewPage()">&#9664;</button>
        <span class="pg-info" id="pgInfo">1 / 1</span>
        <button onclick="nextPreviewPage()">&#9654;</button>
      </div>
    </div>

    <!-- 导出 -->
    <div class="section">
      <h2>导出与生成</h2>
      <div class="export-panel">
        <button class="export-btn btn-primary" onclick="downloadBrief()">&#11015; 下载 brief.json</button>
        <button class="export-btn btn-secondary" onclick="copyBrief()">&#128203; 复制 JSON</button>
        <button class="export-btn btn-outline" onclick="copyCommand()">&#128203; 复制命令</button>
        <div style="margin-top: 12px; font-size: 13px; color: var(--muted);">运行以下命令生成 PPT：</div>
        <div class="cmd-box" id="cmdBox"></div>
      </div>
    </div>

    <!-- Brief JSON 只读视图 -->
    <div class="section">
      <h2>简报 JSON</h2>
      <div class="cmd-box" id="jsonView" style="max-height: 300px; overflow-y: auto;"></div>
    </div>

  </div><!-- /right-panel -->
</div><!-- /main -->

<div class="toast" id="toast"></div>

    {type:"summary",title:"邀请共赏"},
  ]},
  fintech_report: { label:"金融研报", desc:"行业/数据研报：摘要 → 数据 → 结论", theme:"fintech_green", narrative:"inform", delivery:"editable", pages:[
    {type:"cover",title:"研报标题"},
    {type:"section",title:"摘要"},
    {type:"chart",title:"核心数据"},
    {type:"content",title:"趋势判断",items:["判断一","判断二"]},
    {type:"two_column",title:"风险与机会",items:["风险","机会"]},
    {type:"summary",title:"投资建议"},
  ]},
};

const NARRATIVE_SKELETONS = {
  persuade: [
    {type:"cover",purpose:"封面 + 一句话价值主张"},
    {type:"section",purpose:"痛点：现状为什么痛"},
    {type:"content",purpose:"为什么是现在（趋势/窗口）"},
    {type:"content",purpose:"我们的方案（核心差异）"},
    {type:"media",purpose:"证明：数据 / 案例 / 客户"},
    {type:"chart",purpose:"价值 / ROI 量化"},
    {type:"summary",purpose:"行动号召（试用 / 投资 / 合作）"},
  ],
  inform: [
    {type:"cover",purpose:"封面 + 本期主题"},
    {type:"agenda",purpose:"议程"},
    {type:"content",purpose:"背景 / 目标"},
    {type:"chart",purpose:"关键进展（数据）"},
    {type:"two_column",purpose:"问题分析（左因 / 右果）"},
    {type:"summary",purpose:"结论"},
    {type:"contact",purpose:"下一步 / 负责人"},
  ],
  teach: [
    {type:"cover",purpose:"封面 + 课程名"},
    {type:"section",purpose:"学习目标"},
    {type:"content",purpose:"核心概念"},
    {type:"content",purpose:"原理解析"},
    {type:"media",purpose:"实战案例"},
    {type:"two_column",purpose:"随堂练习（左题 / 右思路）"},
    {type:"summary",purpose:"小结 + 拓展阅读"},
  ],
  inspire: [
    {type:"cover",purpose:"封面 + 使命金句"},
    {type:"quote",purpose:"愿景 / 使命"},
    {type:"content",purpose:"共鸣故事"},
    {type:"section",purpose:"挑战 / 机遇"},
    {type:"content",purpose:"我们的行动"},
    {type:"summary",purpose:"邀请同行（号召）"},
    {type:"contact",purpose:"加入方式"},
  ],
};

const PAGE_TYPES = ["cover","section","content","two_column","media","chart","table","timeline","quote","agenda","summary","contact"];
const PAGE_TYPE_LABELS = {
  cover:"封面", section:"章节", content:"内容", two_column:"双栏",
  media:"图文", chart:"图表", table:"表格", timeline:"时间线",
  quote:"金句", agenda:"议程", summary:"总结", contact:"联系方式",
};
const NARRATIVE_LABELS = { persuade:"说服型", inform:"通知型", teach:"教学型", inspire:"激励型" };
const DELIVERY_LABELS = { editable:"可编辑", showcase:"演示天花板" };

// =====================================================================
// 状态
// =====================================================================
let state = {
  template: null,
  delivery: "editable",
  theme: "tech_dark",
  narrative: "persuade",
  pages: [],
  previewPage: 0,
};

// =====================================================================
// 初始化
// =====================================================================
function init() {
  renderTemplateGrid();
  renderThemeGrid();
  applyTemplate("startup_pitch");
  updatePreview();
}

// =====================================================================
// 模板市场
// =====================================================================
function renderTemplateGrid() {
  const grid = document.getElementById("tmplGrid");
  grid.innerHTML = "";
  for (const [id, t] of Object.entries(TEMPLATES)) {
    const card = document.createElement("div");
    card.className = "tmpl-card";
    card.dataset.id = id;
    card.innerHTML = `
      <div class="label">${t.label}</div>
      <div class="desc">${t.desc}</div>
      <div class="meta">
        <span>${NARRATIVE_LABELS[t.narrative]}</span>
        <span>${DELIVERY_LABELS[t.delivery]}</span>
        <span>${t.pages.length} 页</span>
      </div>`;
    card.onclick = () => applyTemplate(id);
    grid.appendChild(card);
  }
}

function applyTemplate(id) {
  const t = TEMPLATES[id];
  if (!t) return;
  state.template = id;
  state.delivery = t.delivery;
  state.theme = t.theme;
  state.narrative = t.narrative;
  state.pages = JSON.parse(JSON.stringify(t.pages));
  state.previewPage = 0;

  document.querySelectorAll(".tmpl-card").forEach(c => {
    c.classList.toggle("active", c.dataset.id === id);
  });

  document.getElementById("f_topic").value = t.label;
  document.getElementById("f_audience").value = "";
  document.getElementById("f_goal").value = NARRATIVE_LABELS[t.narrative];
  document.getElementById("f_narrative").value = t.narrative;
  document.getElementById("f_length").value = t.pages.length;
  document.getElementById("f_sections").value = Math.max(3, Math.min(6, Math.floor(t.pages.length / 2)));
  document.getElementById("f_constraints").value = "";
  document.getElementById("f_acceptance").value =
    t.delivery === "editable" ? "可编辑 / 无水印 / 中文正常" : "视觉震撼，适合演示/路演";

  document.querySelectorAll(".toggle-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.delivery === state.delivery);
  });

  renderThemeGrid();
  renderPages();
  updatePreview();
}

// =====================================================================
// 交付路径切换
// =====================================================================
function setDelivery(d) {
  state.delivery = d;
  document.querySelectorAll(".toggle-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.delivery === d);
  });
  document.getElementById("f_acceptance").value =
    d === "editable" ? "可编辑 / 无水印 / 中文正常" : "视觉震撼，适合演示/路演";
  updatePreview();
}

// =====================================================================
// 主题市场
// =====================================================================
function renderThemeGrid() {
  const grid = document.getElementById("themeGrid");
  grid.innerHTML = "";
  for (const [id, t] of Object.entries(THEMES)) {
    const card = document.createElement("div");
    card.className = "theme-card" + (id === state.theme ? " active" : "");
    card.innerHTML = `
      <div class="swatch-row">
        <div style="background:#${t.bg}"></div>
        <div style="background:#${t.surface}"></div>
        <div style="background:#${t.primary}"></div>
        <div style="background:#${t.secondary}"></div>
        <div style="background:#${t.accent}"></div>
      </div>
      <div class="info">
        <div class="name">${t.label}</div>
        <div class="hint">#${t.primary} / #${t.accent}</div>
      </div>`;
    card.onclick = () => { state.theme = id; renderThemeGrid(); updatePreview(); };
    grid.appendChild(card);
  }
}

// =====================================================================
// 叙事结构切换 → 按骨架重建页面
// =====================================================================
function onNarrativeChange() {
  const n = document.getElementById("f_narrative").value;
  state.narrative = n;
  const skeleton = NARRATIVE_SKELETONS[n];
  if (!skeleton) return;
  if (state.pages.length === skeleton.length) {
    state.pages.forEach((pg, i) => { pg.type = skeleton[i].type; });
  } else {
    state.pages = skeleton.map(s => ({ type: s.type, title: s.purpose, items: [] }));
  }
  state.previewPage = 0;
  document.getElementById("f_length").value = state.pages.length;
  renderPages();
  updatePreview();
}

// =====================================================================
// 页面编辑器
// =====================================================================
function renderPages() {
  const list = document.getElementById("pageList");
  list.innerHTML = "";
  state.pages.forEach((pg, i) => {
    const div = document.createElement("div");
    div.className = "page-item";
    let typeOpts = PAGE_TYPES.map(t =>
      `<option value="${t}" ${t === pg.type ? "selected" : ""}>${PAGE_TYPE_LABELS[t]}</option>`
    ).join("");
    div.innerHTML = `
      <div class="pg-num">${i + 1}</div>
      <select onchange="updatePageType(${i}, this.value)">${typeOpts}</select>
      <input type="text" value="${escHtml(pg.title || "")}" placeholder="页面标题"
             oninput="updatePageTitle(${i}, this.value)">
      <button class="del-btn" onclick="delPage(${i})">&times;</button>`;
    list.appendChild(div);
  });
}

function addPage() {
  state.pages.push({ type: "content", title: "", items: [] });
  renderPages();
  updatePreview();
}

function delPage(i) {
  state.pages.splice(i, 1);
  if (state.previewPage >= state.pages.length) state.previewPage = Math.max(0, state.pages.length - 1);
  renderPages();
  updatePreview();
}

function updatePageType(i, val) { state.pages[i].type = val; updatePreview(); }
function updatePageTitle(i, val) { state.pages[i].title = val; updatePreview(); }

// =====================================================================
// 构建 Brief JSON
// =====================================================================
function buildBrief() {
  return {
    template: state.template || "",
    topic: val("f_topic"),
    audience: val("f_audience"),
    goal: val("f_goal"),
    narrative: state.narrative,
    delivery: state.delivery,
    theme: state.theme,
    length: parseInt(val("f_length")) || state.pages.length,
    sections: parseInt(val("f_sections")) || 4,
    constraints: val("f_constraints"),
    acceptance: val("f_acceptance"),
    pages: state.pages,
  };
}

function val(id) { return document.getElementById(id).value.trim(); }

// =====================================================================
// 实时预览
// =====================================================================
function updatePreview() {
  const brief = buildBrief();
  const theme = THEMES[state.theme] || THEMES.tech_dark;
  const slide = document.getElementById("previewSlide");
  const content = document.getElementById("previewContent");

  slide.style.background = `#${theme.bg}`;

  const pgIdx = Math.min(state.previewPage, state.pages.length - 1);
  const pg = state.pages[pgIdx] || { type: "cover", title: brief.topic };

  let html = "";
  const titleColor = `#${theme.primary}`;
  const textColor = `#${theme.text}`;
  const mutedColor = `#${theme.muted}`;
  const accentColor = `#${theme.accent}`;
  const surfaceColor = `#${theme.surface}`;
  const secondaryColor = `#${theme.secondary}`;

  switch (pg.type) {
    case "cover":
      html = `
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
          <div style="font-size:11px; color:${accentColor}; letter-spacing:3px; margin-bottom:8px;">${escHtml(brief.topic || "未命名")}</div>
          <div style="font-size:28px; font-weight:700; color:${titleColor}; line-height:1.3;">${escHtml(pg.title || "幻灯片标题")}</div>
          ${brief.audience ? `<div style="font-size:13px; color:${mutedColor}; margin-top:12px;">面向 ${escHtml(brief.audience)}</div>` : ""}
        </div>`;
      break;
    case "section":
      html = `
        <div style="flex:1; display:flex; align-items:center;">
          <div style="border-left:4px solid ${accentColor}; padding-left:20px;">
            <div style="font-size:48px; font-weight:800; color:${titleColor};">${escHtml(pg.title || "章节")}</div>
            <div style="font-size:14px; color:${mutedColor}; margin-top:8px;">${escHtml(brief.topic || "")}</div>
          </div>
        </div>`;
      break;
    case "quote":
      html = `
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
          <div style="font-size:36px; color:${accentColor}; margin-bottom:8px;">&ldquo;</div>
          <div style="font-size:22px; font-weight:600; color:${textColor}; line-height:1.5; max-width:80%;">${escHtml(pg.title || "金句")}</div>
          <div style="font-size:13px; color:${mutedColor}; margin-top:16px;">&mdash; ${escHtml(brief.topic || "")}</div>
        </div>`;
      break;
    case "content":
      html = `
        <div style="font-size:22px; font-weight:700; color:${titleColor}; margin-bottom:16px; border-bottom:2px solid ${surfaceColor}; padding-bottom:8px;">${escHtml(pg.title || "内容")}</div>
        <div style="flex:1;">
          ${(pg.items||[]).map((item, i) => `
            <div style="display:flex; align-items:start; gap:10px; margin-bottom:10px;">
              <div style="background:${accentColor}; color:#${theme.bg}; font-size:11px; font-weight:700; width:20px; height:20px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;">${i+1}</div>
              <div style="font-size:14px; color:${textColor};">${escHtml(item)}</div>
            </div>`).join("")}
          ${(!pg.items||pg.items.length===0) ? `<div style="font-size:14px; color:${mutedColor};">添加要点到此页面……</div>` : ""}
        </div>`;
      break;
    case "two_column":
      html = `
        <div style="font-size:22px; font-weight:700; color:${titleColor}; margin-bottom:16px;">${escHtml(pg.title || "双栏")}</div>
        <div style="flex:1; display:grid; grid-template-columns:1fr 1fr; gap:16px;">
          <div style="background:${surfaceColor}; border-radius:8px; padding:16px;">
            <div style="font-size:12px; color:${secondaryColor}; font-weight:600; margin-bottom:8px;">左栏</div>
            <div style="font-size:14px; color:${textColor};">${escHtml((pg.items||[])[0] || "……")}</div>
          </div>
          <div style="background:${surfaceColor}; border-radius:8px; padding:16px;">
            <div style="font-size:12px; color:${accentColor}; font-weight:600; margin-bottom:8px;">右栏</div>
            <div style="font-size:14px; color:${textColor};">${escHtml((pg.items||[])[1] || "……")}</div>
          </div>
        </div>`;
      break;
    case "media":
      html = `
        <div style="font-size:22px; font-weight:700; color:${titleColor}; margin-bottom:16px;">${escHtml(pg.title || "图文")}</div>
        <div style="flex:1; background:${surfaceColor}; border-radius:8px; display:flex; align-items:center; justify-content:center;">
          <div style="font-size:40px; opacity:.3;">&#128247;</div>
        </div>`;
      break;
    case "chart":
      html = `
        <div style="font-size:22px; font-weight:700; color:${titleColor}; margin-bottom:16px;">${escHtml(pg.title || "图表")}</div>
        <div style="flex:1; background:${surfaceColor}; border-radius:8px; padding:16px; display:flex; align-items:flex-end; gap:12px;">
          <div style="flex:1; background:${secondaryColor}; border-radius:4px 4px 0 0; height:60%;"></div>
          <div style="flex:1; background:${accentColor}; border-radius:4px 4px 0 0; height:85%;"></div>
          <div style="flex:1; background:${titleColor}; border-radius:4px 4px 0 0; height:45%;"></div>
          <div style="flex:1; background:${secondaryColor}; border-radius:4px 4px 0 0; height:70%;"></div>
        </div>`;
      break;
    case "agenda":
      html = `
        <div style="font-size:22px; font-weight:700; color:${titleColor}; margin-bottom:16px;">${escHtml(pg.title || "议程")}</div>
        <div style="flex:1;">
          ${["01","02","03","04"].map((n,i) => `
            <div style="display:flex; gap:12px; margin-bottom:10px; align-items:center;">
              <span style="font-size:20px; font-weight:800; color:${accentColor};">${n}</span>
              <span style="font-size:14px; color:${textColor};">议程项 ${i+1}</span>
            </div>`).join("")}
        </div>`;
      break;
    case "summary":
      html = `
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
          <div style="font-size:11px; color:${accentColor}; letter-spacing:3px; margin-bottom:8px;">总结</div>
          <div style="font-size:26px; font-weight:700; color:${titleColor}; line-height:1.3;">${escHtml(pg.title || "总结")}</div>
          <div style="margin-top:20px; padding:10px 24px; background:${accentColor}; color:#${theme.bg}; border-radius:24px; font-size:14px; font-weight:600;">行动号召</div>
        </div>`;
      break;
    case "contact":
      html = `
        <div style="font-size:22px; font-weight:700; color:${titleColor}; margin-bottom:16px;">${escHtml(pg.title || "联系方式")}</div>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; gap:10px;">
          <div style="font-size:14px; color:${textColor};">&#9742; contact@example.com</div>
          <div style="font-size:14px; color:${mutedColor};">&#127759; www.example.com</div>
        </div>`;
      break;
    case "table":
      html = `
        <div style="font-size:22px; font-weight:700; color:${titleColor}; margin-bottom:16px;">${escHtml(pg.title || "表格")}</div>
        <div style="flex:1; background:${surfaceColor}; border-radius:8px; padding:12px;">
          <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:1px; background:${surfaceColor};">
            ${["列 A","列 B","列 C","——","——","——","——","——","——"].map((c,i) =>
              `<div style="background:#${theme.bg}; padding:8px; font-size:12px; color:${i<3?accentColor:textColor}; font-weight:${i<3?600:400};">${c}</div>`
            ).join("")}
          </div>
        </div>`;
      break;
    case "timeline":
      html = `
        <div style="font-size:22px; font-weight:700; color:${titleColor}; margin-bottom:16px;">${escHtml(pg.title || "时间线")}</div>
        <div style="flex:1; display:flex; align-items:center; justify-content:space-around; position:relative;">
          <div style="position:absolute; left:10%; right:10%; top:50%; height:2px; background:${accentColor};"></div>
          ${["Q1","Q2","Q3","Q4"].map(q => `
            <div style="position:relative; z-index:1; text-align:center;">
              <div style="width:32px; height:32px; border-radius:50%; background:${accentColor}; border:3px solid #${theme.bg}; margin:0 auto 6px;"></div>
              <div style="font-size:12px; color:${mutedColor};">${q}</div>
            </div>`).join("")}
        </div>`;
      break;
    default:
      html = `<div style="font-size:20px; color:${titleColor};">${escHtml(pg.title || "幻灯片")}</div>`;
  }

  content.innerHTML = html;

  document.getElementById("pgInfo").textContent =
    `${pgIdx + 1} / ${state.pages.length}`;

  document.getElementById("jsonView").textContent =
    JSON.stringify(brief, null, 2);

  const ext = state.delivery === "showcase" ? "html" : "pptx";
  document.getElementById("cmdBox").textContent =
    `python3 scripts/generate.py brief.json --out output/deck.${ext}`;
}

function prevPreviewPage() {
  if (state.previewPage > 0) { state.previewPage--; updatePreview(); }
}
function nextPreviewPage() {
  if (state.previewPage < state.pages.length - 1) { state.previewPage++; updatePreview(); }
}

// =====================================================================
// 导出
// =====================================================================
function downloadBrief() {
  const brief = buildBrief();
  const blob = new Blob([JSON.stringify(brief, null, 2) + "\n"], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "brief.json";
  a.click();
  URL.revokeObjectURL(a.href);
  showToast("brief.json 已下载");
}

function copyBrief() {
  const brief = buildBrief();
  navigator.clipboard.writeText(JSON.stringify(brief, null, 2)).then(
    () => showToast("简报 JSON 已复制到剪贴板"),
    () => showToast("复制失败，请手动选择 JSON")
  );
}

function copyCommand() {
  const ext = state.delivery === "showcase" ? "html" : "pptx";
  const cmd = `python3 scripts/generate.py brief.json --out output/deck.${ext}`;
  navigator.clipboard.writeText(cmd).then(
    () => showToast("命令已复制"),
    () => showToast("复制失败")
  );
}

// =====================================================================
// 工具函数
// =====================================================================
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function escHtml(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

// =====================================================================
// 启动
// =====================================================================
init();
</script>
</body>
</html>
